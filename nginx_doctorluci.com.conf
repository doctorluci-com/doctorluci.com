# Dr. Lucia — doctorluci.com
# Upstream: systemd service `doctorluci-wrangler` (Wrangler local, built worker on :3000)
# After deploy: cd /var/www/doctorluci.com && npm ci && npm run build && sudo systemctl restart doctorluci-wrangler
# After nginx edits: sudo nginx -t && sudo systemctl restart nginx

# HTTP — Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name doctorluci.com www.doctorluci.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location / {
        return 301 https://$host$request_uri;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS — reverse proxy to Wrangler (TanStack Start / Cloudflare worker build)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name doctorluci.com www.doctorluci.com;

    ssl_certificate /etc/letsencrypt/live/doctorluci.com-temp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doctorluci.com-temp/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/doctorluci.com-temp/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        text/css
        text/javascript
        text/xml
        text/plain
        application/javascript
        application/json
        application/xml
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    access_log /var/log/nginx/doctorluci.com.access.log;
    error_log /var/log/nginx/doctorluci.com.error.log;

    # Serve /assets/* via the worker (same origin as HTML). Do not use `location ~ /\.`
    # with a single backslash before the dot: nginx passes `.` to PCRE as "any character",
    # so `/\.` matches `/a` in `/assets/...` and hijacks every normal URL.

    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Literal slash + dot (hidden paths like /.env). Needs `\\.` in this file for PCRE `\.`
    location ~ /\\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
